name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish-windows:
    name: Publish Windows (win-x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: |
          dotnet publish CalendarPi.csproj -c Release -r win-x64 --self-contained false /p:PublishTrimmed=false -o ./publish/win-x64
          powershell -Command "Compress-Archive -Path publish/win-x64/* -DestinationPath CalendarPi-win-x64-${{ github.run_number }}.zip -Force"

      - name: Upload artifact (win)
        uses: actions/upload-artifact@v4
        with:
          name: CalendarPi-win-x64-${{ github.run_number }}.zip
          path: CalendarPi-win-x64-${{ github.run_number }}.zip

  publish-linux:
    name: Publish Linux (linux-arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish linux-arm64
        run: |
          dotnet publish CalendarPi.csproj -c Release -r linux-arm64 --self-contained false /p:PublishTrimmed=false -o ./publish/linux-arm64
          cd publish
          zip -r ../CalendarPi-linux-arm64-${{ github.run_number }}.zip linux-arm64
          cd ..

      - name: Upload artifact (linux)
        uses: actions/upload-artifact@v4
        with:
          name: CalendarPi-linux-arm64-${{ github.run_number }}.zip
          path: CalendarPi-linux-arm64-${{ github.run_number }}.zip

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish-windows, publish-linux]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CalendarPi-win-x64-${{ github.run_number }}.zip

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CalendarPi-linux-arm64-${{ github.run_number }}.zip

      - name: Compute release tag
        run: echo "RELEASE_TAG=$(date -u +%Y.%m.%d).${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          release_name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          # The action uses the built-in GITHUB_TOKEN from the workflow environment.
          # Do not pass token as an input to avoid unexpected input warnings.

      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./CalendarPi-win-x64-${{ github.run_number }}.zip
          asset_name: CalendarPi-win-x64-${{ github.run_number }}.zip
          asset_content_type: application/zip

      - name: Upload Linux ARM64 asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./CalendarPi-linux-arm64-${{ github.run_number }}.zip
          asset_name: CalendarPi-linux-arm64-${{ github.run_number }}.zip
          asset_content_type: application/zip
